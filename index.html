<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-App</title>
    <meta name="author" content="Sabile, Aldrian">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

</head>
<body>
    <nav class="navbar">
        <h1 id="nav-title">Weather</h1>
        <h2 id="city-name"></h2>
    </nav>
    <section class="hero" id="hero-section">
        <h2>Check the weather anywhere</h2>
    </section>
    <section class='search-bar'>
        <form id="input-form">
            <input id="city-input" type="text" placeholder="Search City..." required>

        </form>   
    </section>

    <main>
        <section class="display-current-weather">

        </section>
        <section class="display-forecast-weather">

        </section>
    </main>

    <script src="scripts.js"></script>
</body>
